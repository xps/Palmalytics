name: Publish to NuGet

# Triggered only when a version tag is pushed, e.g. v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    # Required for Trusted Publishing: lets the workflow request an OIDC token
    # that nuget.org exchanges for a short-lived API key (no stored secret).
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: Palmalytics.Dashboard/package-lock.json

      # Derive the package version from the tag (strip the leading "v")
      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Build the front-end; output is embedded into the Palmalytics package
      - name: Build dashboard
        working-directory: Palmalytics.Dashboard
        run: |
          npm ci
          npm run build-linux

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: |
          dotnet pack Palmalytics/Palmalytics.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./artifacts
          dotnet pack Palmalytics.SqlServer/Palmalytics.SqlServer.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./artifacts

      # Exchange the OIDC token for a short-lived NuGet API key.
      # Set `user` to your nuget.org account username.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: xps

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
